apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlezcano-playground
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playground
  template:
    metadata:
      labels:
        app: playground
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: mlezcano-playground
        image: mikelezc/playground:v1
        env:
        - name: VERSION
          value: "v1" # Para cambiar la versión ponemos este número en 1 o en 2
        ports:
        - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: mlezcano-playground
  namespace: dev
spec:
  type: NodePort
  ports:
  - port: 8888
    targetPort: 8888
    nodePort: 30080
  selector:
    app: playground

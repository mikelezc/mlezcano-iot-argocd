apiVersion: apps/v1
kind: Deployment
metadata:
  name: wil-playground
  namespace: dev # IMPORTANTE: debe ir en el namespace dev, tal y como indica el subject
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playground
  template:
    metadata:
      labels:
        app: playground
    spec:
      containers:
      - name: wil-playground
        image: playground:v1 # Imagen local construida en install.sh (cambiar a v2)
        imagePullPolicy: Never # No descargar de Docker Hub, usar local
        ports:
        - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: wil-playground
  namespace: dev
spec:
  type: NodePort
  ports:
  - port: 8888
    targetPort: 8888
    nodePort: 30080
  selector:
    app: playground
